# ===============================================
#  SERVER
# ===============================================
spring.application.name=datmuigrab
server.port=${SERVER_PORT:8080}

# ===============================================
#  POSTGRESQL
# ===============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:datmuigrab}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================================
#  REDIS
# ===============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# ===============================================
#  JWT
# ===============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:86400000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================================
#  CORS
# ===============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===============================================
#  EMAIL (OTP)
# ===============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================================
#  FLYWAY
# ===============================================
spring.flyway.enabled=${FLYWAY_ENABLED:false}



#Nginx Configuration
server.forward-headers-strategy=framework
spring.profiles.active=prod

